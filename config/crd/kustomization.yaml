# This kustomization.yaml is not intended to be run by itself,
# since it depends on service name and namespace that are out of this kustomize package.
# It should be run by config/default
resources:
  - bases/argoproj.io_argocds.yaml
  - bases/argoproj.io_argocdexports.yaml
  - bases/argoproj.io_applications.yaml
  - bases/argoproj.io_applicationsets.yaml
  - bases/argoproj.io_appprojects.yaml
  - bases/argocd-image-updater.argoproj.io_imageupdaters.yaml
  - bases/argoproj.io_notificationsconfigurations.yaml

  - bases/argoproj.io_namespacemanagements.yaml

  - bases/promoter.argoproj.io_argocdcommitstatuses.yaml
  - bases/promoter.argoproj.io_changetransferpolicies.yaml
  - bases/promoter.argoproj.io_clusterscmproviders.yaml
  - bases/promoter.argoproj.io_commitstatuses.yaml
  - bases/promoter.argoproj.io_controllerconfigurations.yaml
  - bases/promoter.argoproj.io_gitcommitstatuses.yaml
  - bases/promoter.argoproj.io_gitrepositories.yaml
  - bases/promoter.argoproj.io_promotionstrategies.yaml
  - bases/promoter.argoproj.io_pullrequests.yaml
  - bases/promoter.argoproj.io_revertcommits.yaml
  - bases/promoter.argoproj.io_scheduledcommitstatuses.yaml
  - bases/promoter.argoproj.io_scmproviders.yaml
  - bases/promoter.argoproj.io_timedcommitstatuses.yaml
  - bases/promoter.argoproj.io_webrequestcommitstatuses.yaml
#+kubebuilder:scaffold:crdkustomizeresource

patches:
  # [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix.
  # patches here are for enabling the conversion webhook for each CRD
  - path: patches/webhook_in_argocds.yaml
  #- path: patches/webhook_in_argocdexports.yaml
  #+kubebuilder:scaffold:crdkustomizewebhookpatch

  # [CERTMANAGER] To enable cert-manager, uncomment all the sections with [CERTMANAGER] prefix.
  # patches here are for enabling the CA injection for each CRD
  - path: patches/cainjection_in_argocds.yaml
#- path: patches/cainjection_in_argocdexports.yaml
#- path: patches/cainjection_in_namespacemanagements.yaml
#+kubebuilder:scaffold:crdkustomizecainjectionpatch

# the following config is for teaching kustomize how to do kustomization for CRDs.
configurations:
  - kustomizeconfig.yaml
